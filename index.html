<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alita Medical Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { font-family: 'Segoe UI'; }

.hero {
background: url('./assets/poli.jpg') center/cover;
height: 90vh;
color: white;
display: flex;
align-items: center;
text-align: center;
background-blend-mode: darken;
background-color: rgba(0,0,0,0.5);
}

.card:hover {
transform: translateY(-10px);
transition: 0.3s;
}

.wa {
position: fixed;
bottom: 20px;
right: 20px;
background: #25D366;
color: white;
padding: 15px;
border-radius: 50%;
font-size: 24px;
}

.review {
background: #f8f9fa;
padding: 10px;
border-radius: 10px;
margin: 5px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow sticky-top">
<div class="container">
<img src="./assets/logo.png" height="40">
<span class="ms-2 fw-bold text-primary">Alita Medical Center</span>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container">
<h1>Kepuasan Anda adalah Prioritas Kami</h1>
<p>Klinik Terpercaya di Balongbendo</p>
<a href="#daftar" class="btn btn-light mt-3">Daftar Sekarang</a>
</div>
</section>

<!-- LAYANAN -->
<section class="container py-5">
<h2 class="text-center mb-4">Layanan Kami</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card p-3">
<h5>Poli Umum</h5>
<img src="./assets/poli.jpg" class="img-fluid">
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>UGD & Tindakan</h5>
<img src="./assets/ugd.jpg" class="img-fluid">
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Laboratorium</h5>
<img src="./assets/lab.jpg" class="img-fluid">
</div>
</div>

</div>
</section>

<!-- PENDAFTARAN -->
<section id="daftar" class="bg-primary text-white py-5">
<div class="container">

<h2 class="text-center mb-4">Pendaftaran Online</h2>

<form id="formDaftar" class="bg-white text-dark p-4 rounded">

<input class="form-control mb-3" placeholder="Nama Lengkap" id="nama" required>
<input class="form-control mb-3" placeholder="NIK" id="nik" required>
<input type="date" class="form-control mb-3" id="ttl" required>
<input class="form-control mb-3" placeholder="Alamat" id="alamat" required>

<select class="form-control mb-3" id="layanan">
<option>Poli Umum</option>
<option>Poli Gigi</option>
<option>Poli KIA</option>
<option>Laboratorium</option>
</select>

<textarea class="form-control mb-3" placeholder="Keluhan" id="keluhan"></textarea>

<button class="btn btn-primary w-100">Daftar Sekarang</button>

</form>

<div id="notif" class="alert alert-success mt-3 d-none text-center">
🎉 Anda berhasil mendaftar layanan!
</div>

</div>
</section>

<!-- REVIEW -->
<section class="container py-5 text-center">
<h2>Ulasan Pasien ⭐⭐⭐⭐⭐</h2>

<div id="review"></div>
</section>

<!-- KONTAK -->
<section class="bg-light p-5 text-center">
<h3>Kontak Kami</h3>

<p>
<a href="https://maps.app.goo.gl/EUdEXF1PZ4oTtPhNA">Google Maps</a><br>
<a href="https://www.instagram.com/klinikalitamedika2023">Instagram</a><br>
<a href="https://www.tiktok.com/@klinik.alita.medika">TikTok</a><br>
<a href="https://www.facebook.com/klinik.alita.medika.real">Facebook</a>
</p>

</section>

<!-- WA -->
<a href="https://wa.me/6282229809228" class="wa">
<i class="bi bi-whatsapp"></i>
</a>

<script>

// FORM
document.getElementById("formDaftar").addEventListener("submit", function(e){
e.preventDefault();

let nama = document.getElementById("nama").value;
let layanan = document.getElementById("layanan").value;

let pesan = `Halo Klinik, saya ${nama} ingin daftar layanan ${layanan}`;

window.open(`https://wa.me/6282229809228?text=${pesan}`);

let notif = document.getElementById("notif");
notif.innerHTML = `✅ Pendaftaran berhasil untuk layanan <b>${layanan}</b>`;
notif.classList.remove("d-none");
});

// REVIEW DINAMIS
let reviews = [
"Pelayanan sangat cepat dan ramah",
"Dokter profesional dan jelas",
"Klinik bersih dan nyaman",
"Daftar online sangat mudah"
];

let reviewHTML = "";
reviews.forEach(r => {
reviewHTML += `<div class="review">⭐⭐⭐⭐⭐ <br>${r}</div>`;
});

document.getElementById("review").innerHTML = reviewHTML;

</script>

</body>
</html>
